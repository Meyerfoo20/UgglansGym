<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UgglansGym</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="grund.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }

        h1 {
            margin-top: 20px;
        }

        #profile-picture {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            margin: 20px;
            background-size: cover;
        }

        #week-calendar {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .day {
            width: 60px;
            height: 60px;
            margin: 5px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            background-color: gray;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
        }

        .day.overkropp {
            background-color: blue;
        }

        .day.ben {
            background-color: green;
        }

        .day.cardio {
            background-color: red;
        }

        .day.none {
            background-color: gray;
        }

        .modal-body {
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .profile-option img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            margin: 5px;
        }

        #weight-chart {
            max-width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-bottom">
    <a class="navbar-brand" href="index.html">UgglansGym</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="index.html">Hem</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="gympass.html">Gympass</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="övningar.html">Övningar</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="profile.html">Profil</a>
            </li>
        </ul>
    </div>
</nav>


    <div style="display: flex; align-items: center;">
        <img id="profile-picture" src="default-profile.jpg" alt="Profilbild" data-toggle="modal" data-target="#profileModal">
        <h1>Min Gym Profil</h1>
    </div>

    <div id="week-calendar" class="container">
        <!-- Kalenderdagarna genereras av JavaScript -->
    </div>

    <canvas id="weight-chart"></canvas>

    <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="profileModalLabel">Profilinformation</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="nameInput">Namn:</label>
                        <input type="text" id="nameInput" class="form-control" placeholder="Ange ditt namn">
                    </div>
                    <div class="form-group">
                        <label for="heightInput">Längd (cm):</label>
                        <input type="number" id="heightInput" class="form-control" placeholder="Ange din längd" min="1">
                    </div>
                    <div class="form-group">
                        <label for="weightInput">Vikt (kg):</label>
                        <input type="number" id="weightInput" class="form-control" placeholder="Ange din vikt" min="1">
                    </div>
                    <div class="form-group">
                        <label for="profilePictureInput">Välj profilbild:</label>
                        <div id="profile-picture-options" class="profile-option">
                            <!-- Profilbildsval genereras av JavaScript -->
                        </div>
                    </div>
                    <button id="saveProfileBtn" class="btn btn-primary">Spara Profil</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Workout Modal -->
    <div class="modal fade" id="workoutModal" tabindex="-1" aria-labelledby="workoutModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="workoutModalLabel">Välj Träningspass</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <button type="button" class="btn btn-primary workout-btn" data-workout="över">Överkropp</button>
                    <button type="button" class="btn btn-success workout-btn" data-workout="ben">Ben</button>
                    <button type="button" class="btn btn-danger workout-btn" data-workout="cardio">Cardio</button>
                    <div class="mt-3">
                        <label for="durationInput">Träningslängd (min):</label>
                        <input type="number" id="durationInput" class="form-control" placeholder="Ange minuter" min="1">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const daysOfWeek = ["Mån", "Tis", "Ons", "Tor", "Fre", "Lör", "Sön"];
            const currentWeek = getCurrentWeek();
            const calendar = document.getElementById("week-calendar");
            const profilePictureElement = document.getElementById('profile-picture');
            const profilePictureOptionsElement = document.getElementById('profile-picture-options');
            const workoutTypes = ["över", "ben", "cardio"];
            const workoutColors = { över: "overkropp", ben: "ben", cardio: "cardio", none: "none" };
            const profilePictures = [
                "default-profile.jpg",
                "profile2.jpg",
                "profile3.jpg"
            ];

            let profileData = loadProfileData();
            let weekData = loadWeekData();
            let weightData = loadWeightData();

            if (profileData) {
                document.getElementById('nameInput').value = profileData.name || '';
                document.getElementById('heightInput').value = profileData.height || '';
                document.getElementById('weightInput').value = profileData.weight || '';
                profilePictureElement.src = profileData.profilePicture || profilePictureElement.src;
            }

            profilePictures.forEach((url, index) => {
                const imgElement = document.createElement("img");
                imgElement.src = url;
                imgElement.dataset.index = index;
                imgElement.addEventListener("click", function() {
                    profilePictureElement.src = url;
                });
                profilePictureOptionsElement.appendChild(imgElement);
            });

            daysOfWeek.forEach((day, index) => {
                const dayDiv = document.createElement("div");
                dayDiv.className = `day ${workoutColors[weekData[index].type]}`;
                dayDiv.innerHTML = `${day}<br>${weekData[index].duration} min`;
                dayDiv.dataset.index = index;
                dayDiv.setAttribute("data-toggle", "modal");
                dayDiv.setAttribute("data-target", "#workoutModal");
                calendar.appendChild(dayDiv);
            });

            $('#workoutModal').on('show.bs.modal', function (event) {
                const button = $(event.relatedTarget);
                const dayIndex = button.data('index');
                const modal = $(this);
                modal.find('.workout-btn').off('click').on('click', function() {
                    const workoutType = $(this).data('workout');
                    const workoutDuration = $('#durationInput').val();
                    if (workoutDuration) {
                        weekData[dayIndex] = { type: workoutType, duration: workoutDuration };
                        saveWeekData(weekData);
                        button.removeClass().addClass(`day ${workoutColors[workoutType]}`).html(`${daysOfWeek[dayIndex]}<br>${workoutDuration} min`);
                        modal.modal('hide');
                    } else {
                        alert('Ange träningslängd i minuter.');
                    }
                });
            });

            document.getElementById('saveProfileBtn').addEventListener('click', function() {
                const name = document.getElementById('nameInput').value;
                const height = document.getElementById('heightInput').value;
                const weight = document.getElementById('weightInput').value;
                const profilePicture = profilePictureElement.src;
                if (name && height && weight) {
                    profileData = { name, height, weight, profilePicture };
                    weightData.push({ week: currentWeek, weight: weight });
                    saveProfileData(profileData);
                    saveWeightData(weightData);
                    updateWeightChart();
                } else {
                    alert('Vänligen fyll i alla fält.');
                }
            });

            function saveProfileData(data) {
                localStorage.setItem("profileData", JSON.stringify(data));
            }

            function loadProfileData() {
                return JSON.parse(localStorage.getItem("profileData"));
            }

            function saveWeekData(data) {
                localStorage.setItem("weekData", JSON.stringify(data));
                localStorage.setItem("weekNumber", currentWeek);
            }

            function loadWeekData() {
                const savedWeekNumber = localStorage.getItem("weekNumber");
                if (savedWeekNumber === currentWeek) {
                    return JSON.parse(localStorage.getItem("weekData")) || new Array(7).fill({ type: "none", duration: 0 });
                } else {
                    localStorage.removeItem("weekData");
                    localStorage.setItem("weekNumber", currentWeek);
                    return new Array(7).fill({ type: "none", duration: 0 });
                }
            }

            function saveWeightData(data) {
                localStorage.setItem("weightData", JSON.stringify(data));
            }

            function loadWeightData() {
                return JSON.parse(localStorage.getItem("weightData")) || [];
            }

            function getCurrentWeek() {
                const currentDate = new Date();
                const startDate = new Date(currentDate.getFullYear(), 0, 1);
                const days = Math.floor((currentDate - startDate) / (24 * 60 * 60 * 1000));
                const weekNumber = Math.ceil(days / 7);
                return `${currentDate.getFullYear()}-W${weekNumber}`;
            }

            function updateWeightChart() {
                const ctx = document.getElementById('weight-chart').getContext('2d');
                const weeks = weightData.map(entry => entry.week);
                const weights = weightData.map(entry => entry.weight);
                
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: weeks,
                        datasets: [{
                            label: 'Vikt (kg)',
                            data: weights,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            datalabels: {
                                display: true,
                                align: 'top',
                                backgroundColor: '#ccc',
                                borderRadius: 3,
                                font: {
                                    size: 10
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            updateWeightChart();
        });
    </script>
</body>
</html>
